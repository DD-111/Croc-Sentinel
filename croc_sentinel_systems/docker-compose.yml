services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: croc_mosquitto
    restart: unless-stopped
    env_file:
      - .env

    command: >
      /bin/sh -c
      "apk add --no-cache gettext >/dev/null
      && envsubst '$$MQTT_PORT $$MQTT_TLS_CA_FILE $$MQTT_TLS_CERT_FILE $$MQTT_TLS_KEY_FILE $$MQTT_TLS_REQUIRE_CLIENT_CERT'
      < /mosquitto/config/mosquitto.conf.template > /mosquitto/config/mosquitto.conf
      && mosquitto -c /mosquitto/config/mosquitto.conf"

    ports:
      - "${MQTT_PORT:-8883}:${MQTT_PORT:-8883}"

    volumes:
      - ./mosquitto/mosquitto.conf.template:/mosquitto/config/mosquitto.conf.template:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./certs:/mosquitto/certs:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

    networks:
      - croc_net


  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: croc_api
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - mosquitto

    expose:
      - "8088"
    # No public host port: use Traefik (80/443) only. For local debug see docker-compose.override.example.yml
    # (e.g. 127.0.0.1:8088 -> 8088).

    # Single process only: MQTT client, mqtt_ingest queue, event_bus, and
    # api_ready_event are in-memory — multiple workers break routing and can
    # duplicate broker connections. Do not add --loop uvloop unless uvloop is
    # listed in api/requirements.txt.
    command: >
      uvicorn app:app
      --host 0.0.0.0
      --port 8088

    volumes:
      - ./data:/data
      - ./certs/ca.crt:/etc/sentinel/mqtt-ca.crt:ro

    networks:
      - croc_net

    labels:
      - "traefik.enable=true"

      # ✅ FIXED: must match REAL network name
      - "traefik.docker.network=croc_net"

      # External API at https://HOST/api/* → StripPrefix → FastAPI /*
      - "traefik.http.middlewares.sentinel-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.sentinel-api.rule=(Host(`esasecure.com`) || Host(`www.esasecure.com`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.sentinel-api.priority=100"
      - "traefik.http.routers.sentinel-api.middlewares=sentinel-api-strip"
      - "traefik.http.routers.sentinel-api.entrypoints=websecure"
      - "traefik.http.routers.sentinel-api.tls=true"
      - "traefik.http.routers.sentinel-api.tls.certresolver=le"
      - "traefik.http.routers.sentinel-api.service=api"

      # Console + root paths (/console, /health, …) without /api prefix
      - "traefik.http.routers.sentinel-web.rule=Host(`esasecure.com`) || Host(`www.esasecure.com`)"
      - "traefik.http.routers.sentinel-web.priority=1"
      - "traefik.http.routers.sentinel-web.entrypoints=websecure"
      - "traefik.http.routers.sentinel-web.tls=true"
      - "traefik.http.routers.sentinel-web.tls.certresolver=le"
      - "traefik.http.routers.sentinel-web.service=api"

      - "traefik.http.services.api.loadbalancer.server.port=8088"


  ota-nginx:
    image: nginx:1.27-alpine
    container_name: croc_ota_nginx
    restart: unless-stopped
    env_file:
      - .env

    command: >
      /bin/sh -c
      "apk add --no-cache gettext >/dev/null
      && envsubst '$$OTA_TOKEN'
      < /etc/nginx/templates/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

    expose:
      - "8070"

    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./firmware:/opt/sentinel/firmware:ro

    networks:
      - croc_net


  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    env_file:
      - .env

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=false"
      - "--ping=true"

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json

    networks:
      - croc_net


networks:
  croc_net:
    driver: bridge