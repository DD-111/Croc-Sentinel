services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: croc_mosquitto
    restart: unless-stopped
    env_file:
      - .env

    command: >
      /bin/sh -c
      "apk add --no-cache gettext >/dev/null
      && envsubst '$$MQTT_PORT $$MQTT_TLS_CA_FILE $$MQTT_TLS_CERT_FILE $$MQTT_TLS_KEY_FILE $$MQTT_TLS_REQUIRE_CLIENT_CERT'
      < /mosquitto/config/mosquitto.conf.template > /mosquitto/config/mosquitto.conf
      && mosquitto -c /mosquitto/config/mosquitto.conf"

    ports:
      - "${MQTT_PORT:-8883}:${MQTT_PORT:-8883}"

    volumes:
      - ./mosquitto/mosquitto.conf.template:/mosquitto/config/mosquitto.conf.template:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./certs:/mosquitto/certs:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

    networks:
      - croc_net


  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: croc_api
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - mosquitto
      - ota-nginx

    expose:
      - "8088"
    # Plain HTTP on host (no Traefik / no ACME). Point browser + FACTORY_UI_API_BASE at http://HOST:18999
    ports:
      - "18999:8088"

    # Default: one process (MQTT client + in-memory bus). For horizontal scale,
    # set REDIS_URL (event bridge) and run multiple API replicas or uvicorn
    # --workers N behind a load balancer — do not use multiple workers without
    # Redis or you will split SSE/WS sessions and duplicate MQTT connects.
    # Do not add --loop uvloop unless uvloop is listed in api/requirements.txt.
    command: >
      uvicorn app:app
      --host 0.0.0.0
      --port 8088

    volumes:
      - ./data:/data
      - ./certs/ca.crt:/etc/sentinel/mqtt-ca.crt:ro
      # Same host dir as ota-nginx so uploads and firmware list match /fw/ files.
      - ./firmware:/opt/sentinel/firmware

    networks:
      - croc_net


  ota-nginx:
    image: nginx:1.27-alpine
    container_name: croc_ota_nginx
    restart: unless-stopped
    env_file:
      - .env

    command: >
      /bin/sh -c
      "apk add --no-cache gettext >/dev/null
      && envsubst '$$OTA_TOKEN'
      < /etc/nginx/templates/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

    expose:
      - "9231"
    # Host nginx (e.g. ota.esasecure.com HTTPS) proxies to this — bind loopback only.
    ports:
      - "127.0.0.1:9231:9231"

    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./firmware:/opt/sentinel/firmware:ro

    networks:
      - croc_net


networks:
  croc_net:
    name: croc_net
    driver: bridge