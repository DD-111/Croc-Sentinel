services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: croc_mosquitto
    restart: unless-stopped
    env_file:
      - .env

    command: >
      /bin/sh -c
      "apk add --no-cache gettext >/dev/null
      && envsubst '$$MQTT_PORT $$MQTT_TLS_CA_FILE $$MQTT_TLS_CERT_FILE $$MQTT_TLS_KEY_FILE $$MQTT_TLS_REQUIRE_CLIENT_CERT'
      < /mosquitto/config/mosquitto.conf.template > /mosquitto/config/mosquitto.conf
      && mosquitto -c /mosquitto/config/mosquitto.conf"

    ports:
      - "${MQTT_PORT:-8883}:${MQTT_PORT:-8883}"

    volumes:
      - ./mosquitto/mosquitto.conf.template:/mosquitto/config/mosquitto.conf.template:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./certs:/mosquitto/certs:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

    networks:
      - croc_net


  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    container_name: croc_api
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - mosquitto

    # ✅ IMPORTANT: ONLY internal, Traefik handles public access
    expose:
      - "8088"

    # Single process only: MQTT client, mqtt_ingest queue, event_bus, and
    # api_ready_event are in-memory — multiple workers break routing and can
    # duplicate broker connections. Do not add --loop uvloop unless uvloop is
    # listed in api/requirements.txt.
    command: >
      uvicorn app:app
      --host 0.0.0.0
      --port 8088

    volumes:
      - ./data:/data
      - ./certs/ca.crt:/etc/sentinel/mqtt-ca.crt:ro

    networks:
      - croc_net

    labels:
      - "traefik.enable=true"

      # ✅ FIXED: must match REAL network name
      - "traefik.docker.network=croc_net"

      # Match apex + www (adjust hostnames to your real domain).
      - "traefik.http.routers.api.rule=Host(`esasecure.com`) || Host(`www.esasecure.com`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8088"


  ota-nginx:
    image: nginx:1.27-alpine
    container_name: croc_ota_nginx
    restart: unless-stopped
    env_file:
      - .env

    command: >
      /bin/sh -c
      "apk add --no-cache gettext >/dev/null
      && envsubst '$$OTA_TOKEN'
      < /etc/nginx/templates/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

    expose:
      - "8070"

    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./firmware:/opt/sentinel/firmware:ro

    networks:
      - croc_net


  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=false"
      - "--ping=true"

    ports:
      - "80:80"
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - croc_net


networks:
  croc_net:
    driver: bridge