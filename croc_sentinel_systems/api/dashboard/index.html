<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <title>Croc Sentinel Console</title>
    <link rel="stylesheet" href="assets/app.css" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23111827' stroke='%2338bdf8' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='%2338bdf8'/></svg>" />
  </head>
  <body class="app-shell" data-auth="unknown">
    <aside class="sidebar" id="sidebar" aria-label="主导航">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <div class="brand-text">
          <strong>Croc Sentinel</strong>
          <span class="brand-sub">Operations Console</span>
        </div>
        <button class="icon-btn sidebar-close" id="sidebarClose" aria-label="关闭导航">✕</button>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <div class="who" id="who">未登录</div>
        <div class="sidebar-actions">
          <button class="btn ghost" id="themeBtn" type="button" title="切换主题">
            <span aria-hidden="true">◐</span><span>主题</span>
          </button>
          <button class="btn ghost" id="logoutBtn" type="button">退出</button>
        </div>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="展开导航">☰</button>
        <div class="crumb" id="crumb">总览</div>
        <div class="topbar-actions">
          <span class="dot-status" id="mqttDot" title="MQTT"></span>
          <button class="btn ghost" id="refreshBtn" type="button" title="刷新">
            <span aria-hidden="true">↻</span><span class="hide-sm">刷新</span>
          </button>
        </div>
      </header>

      <section id="view" class="view"></section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
