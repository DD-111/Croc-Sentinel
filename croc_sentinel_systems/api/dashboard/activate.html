<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Croc Sentinel — 激活设备</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>激活设备（序列号 / QR）</h1>
    <nav>
      <a href="index.html">设备</a>
      <a href="alerts.html">红色警报</a>
      <a href="activate.html">激活 / Claim</a>
    </nav>
  </header>
  <div class="panel">
    <p class="meta">
      后端：<code>GET /provision/pending?q=</code> 支持按 MAC（无冒号）或 QR 子串筛选；
      <code>POST /provision/claim</code> 提交绑定。需 <strong>admin</strong> 及以上角色（或 legacy API_TOKEN）。
    </p>
    <div class="row">
      <label>Token
        <input type="password" id="token" style="min-width:280px" />
      </label>
      <button type="button" id="saveTok">保存</button>
    </div>
    <div class="row">
      <label>搜索待激活（MAC / QR 片段）
        <input type="text" id="q" placeholder="A1B2C3D4E5F6 或 CROC" />
      </label>
      <button type="button" id="search">查询待激活列表</button>
    </div>
    <div id="pending"></div>
    <hr style="border-color:var(--border);margin:1.5rem 0" />
    <h2 style="font-size:1rem">手动 Claim</h2>
    <div class="row">
      <label>MAC（12 位无冒号）
        <input type="text" id="mac" maxlength="12" placeholder="A1B2C3D4E5F6" />
      </label>
      <label>device_id
        <input type="text" id="dev" placeholder="gate-01" />
      </label>
      <label>zone
        <input type="text" id="zone" value="all" />
      </label>
      <label>qr_code（可选，覆盖默认）
        <input type="text" id="qr" placeholder="留空则用设备上报" />
      </label>
    </div>
    <button type="button" id="claim">提交 Claim</button>
    <div id="err" class="err"></div>
    <div id="ok" class="okmsg"></div>
  </div>
  <script src="api.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    function loadTok() {
      $("token").value = CrocApi.getToken();
    }
    $("saveTok").onclick = () => CrocApi.setToken($("token").value.trim());

    $("search").onclick = async () => {
      $("err").textContent = "";
      $("pending").innerHTML = "";
      const q = $("q").value.trim();
      const path = "/provision/pending" + (q ? "?q=" + encodeURIComponent(q) : "");
      try {
        const data = await CrocApi.apiFetch(path);
        const pre = document.createElement("pre");
        pre.className = "meta";
        pre.style.whiteSpace = "pre-wrap";
        pre.textContent = JSON.stringify(data.items || [], null, 2);
        $("pending").appendChild(pre);
      } catch (e) {
        $("err").textContent = String(e.message || e);
      }
    };

    $("claim").onclick = async () => {
      $("err").textContent = "";
      $("ok").textContent = "";
      CrocApi.setToken($("token").value.trim());
      const body = {
        mac_nocolon: $("mac").value.trim().toUpperCase(),
        device_id: $("dev").value.trim(),
        zone: $("zone").value.trim() || "all",
      };
      const qr = $("qr").value.trim();
      if (qr) body.qr_code = qr;
      try {
        const r = await CrocApi.apiFetch("/provision/claim", { method: "POST", body });
        $("ok").textContent = JSON.stringify(r);
      } catch (e) {
        $("err").textContent = String(e.message || e);
      }
    };
    loadTok();
  </script>
</body>
</html>
