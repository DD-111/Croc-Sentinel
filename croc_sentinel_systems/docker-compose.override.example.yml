# Copy to docker-compose.override.yml (same folder as docker-compose.yml).
# Compose merges this automatically — no change to the default compose file.
#
# Default docker-compose.yml already maps host 8088 -> api:8088 for direct access
# (http://HOST:8088/console/). Use this override when that host port clashes
# (e.g. host Nginx already binds :8088) — bind API only on loopback for a reverse proxy:

services:
  api:
    ports:
      - "127.0.0.1:18088:8088"
