# Copy to docker-compose.override.yml (same folder as docker-compose.yml).
# Compose merges this automatically — no change to the default compose file.
#
# Default compose does NOT publish :8088 publicly (only Traefik 80/443).
# Use this override for emergency direct access on loopback (curl / Arduino smoke test):

services:
  api:
    ports:
      - "127.0.0.1:8088:8088"
